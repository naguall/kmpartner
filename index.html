<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khloe's Moon · Partner</title>
<meta name="theme-color" content="#1B3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#0D1B2A;--bg2:#132238;--primary:#1B3A5C;--accent:#2EC4B6;
--text:#E0E0E0;--heading:#FFFFFF;--border:#1B3A5C;
--menstrual:#E74C3C;--follicular:#F39C12;--ovulation:#27AE60;--luteal:#8E44AD;
--friction-high-color:#EF5350;--friction-high-bg:#2D1515;
--friction-med-color:#FF9800;--friction-med-bg:#2D2215;
--friction-low-color:#4CAF50;--friction-low-bg:#152D18;
--radius:14px;--tab-height:64px;
}
html,body{height:100%;overflow:hidden;}
body{
background:var(--bg);color:var(--text);
font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{color:var(--heading);font-weight:700;}

/* Scrollable area */
.app-container{
display:flex;flex-direction:column;height:100vh;height:100dvh;
}
.screen{
flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:16px 16px calc(var(--tab-height) + 24px) 16px;
display:none;
}
.screen.active{display:block;}

/* Tab bar */
.tab-bar{
position:fixed;bottom:0;left:0;right:0;
height:var(--tab-height);
background:linear-gradient(180deg,#0f2236 0%,#0a1520 100%);
border-top:1px solid var(--border);
display:flex;align-items:center;justify-content:space-around;
z-index:100;
padding-bottom:env(safe-area-inset-bottom,0);
}
.tab-btn{
background:none;border:none;color:#607d8b;
font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
display:flex;flex-direction:column;align-items:center;gap:2px;
padding:6px 16px;cursor:pointer;
transition:color .2s,transform .15s;
}
.tab-btn.active{color:var(--accent);}
.tab-btn .tab-icon{font-size:24px;}
.tab-btn:active{transform:scale(.92);}

/* Cards */
.card{
background:var(--bg2);border:1px solid var(--border);
border-radius:var(--radius);padding:18px;margin-bottom:14px;
transition:transform .15s;
}
.card:active{transform:scale(.985);}

/* Phase card */
.phase-card{
text-align:center;padding:24px 18px;
position:relative;overflow:hidden;
}
.phase-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:4px;
border-radius:var(--radius) var(--radius) 0 0;
}
.phase-card.menstrual::before{background:var(--menstrual);}
.phase-card.follicular::before{background:var(--follicular);}
.phase-card.ovulation::before{background:var(--ovulation);}
.phase-card.luteal::before{background:var(--luteal);}
.phase-emoji{font-size:64px;display:block;margin-bottom:8px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.phase-label{font-size:20px;font-weight:700;margin-bottom:4px;}
.phase-day{font-size:14px;opacity:.7;margin-bottom:8px;}
.phase-mood{font-size:13px;line-height:1.5;opacity:.85;max-width:340px;margin:0 auto;}

/* Friction card */
.friction-card{padding:16px 18px;position:relative;overflow:hidden;}
.friction-card::before{
content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
}
.friction-card.high{background:var(--friction-high-bg)!important;border-color:#5a2020!important;}
.friction-card.high::before{background:var(--friction-high-color);}
.friction-card.medium{background:var(--friction-med-bg)!important;border-color:#5a4420!important;}
.friction-card.medium::before{background:var(--friction-med-color);}
.friction-card.low{background:var(--friction-low-bg)!important;border-color:#205a28!important;}
.friction-card.low::before{background:var(--friction-low-color);}
.friction-level{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.friction-reason{font-size:13px;opacity:.8;}

/* Do's / Don'ts */
.advice-section{margin-top:6px;}
.advice-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.advice-title.do{color:var(--ovulation);}
.advice-title.dont{color:var(--menstrual);}
.advice-list{list-style:none;padding:0;margin:0 0 12px 0;}
.advice-list li{
font-size:13px;line-height:1.5;padding:6px 0 6px 22px;position:relative;
border-bottom:1px solid rgba(255,255,255,.04);
}
.advice-list li::before{
position:absolute;left:0;top:6px;font-size:13px;
}
.advice-list.do li::before{content:'✅';}
.advice-list.dont li::before{content:'🚫';}

/* Tip card */
.tip-card{
background:linear-gradient(135deg,#1B3A5C 0%,#132238 100%);
border:1px solid #2EC4B680;padding:16px 18px;
}
.tip-card .tip-icon{font-size:20px;margin-bottom:6px;display:block;}
.tip-card .tip-text{font-size:13px;line-height:1.6;opacity:.9;}

/* Moon card */
.moon-card{display:flex;align-items:center;gap:14px;padding:14px 18px;}
.moon-emoji{font-size:36px;}
.moon-info{flex:1;}
.moon-name{font-size:14px;font-weight:600;}
.moon-detail{font-size:12px;opacity:.6;margin-top:2px;}

/* Period countdown */
.countdown-card{text-align:center;padding:16px;}
.countdown-num{font-size:36px;font-weight:800;color:var(--accent);line-height:1;}
.countdown-label{font-size:13px;opacity:.7;margin-top:4px;}

/* Unlinked state */
.unlinked-state{
text-align:center;padding:60px 24px;
}
.unlinked-state .big-icon{margin-bottom:20px;display:block;}
.connect-art{width:120px;height:120px;margin:0 auto;}
.unlinked-state h2{font-size:22px;margin-bottom:10px;}
.unlinked-state p{font-size:14px;opacity:.7;margin-bottom:24px;line-height:1.5;}

/* Inputs & buttons */
input[type=text],input[type=password]{
width:100%;padding:12px 16px;border-radius:10px;
background:#0a1520;border:1px solid var(--border);color:var(--text);
font-size:15px;outline:none;
transition:border-color .2s;
}
input[type=text]:focus,input[type=password]:focus{border-color:var(--accent);}
.btn{
display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:12px 24px;border-radius:10px;border:none;
font-size:15px;font-weight:600;cursor:pointer;
transition:transform .12s,opacity .2s;
}
.btn:active{transform:scale(.96);}
.btn-primary{
background:linear-gradient(135deg,var(--accent),#1B8A7E);color:#fff;
}
.btn-danger{background:#3a1515;color:var(--menstrual);border:1px solid #5a2020;}
.btn-secondary{background:var(--primary);color:var(--text);}
.btn-block{width:100%;justify-content:center;}

/* Chat */
.chat-container{
display:flex;flex-direction:column;height:calc(100dvh - var(--tab-height));
}
.chat-messages{
flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
padding:16px 12px 12px 12px;
}
.chat-msg{
max-width:82%;margin-bottom:12px;padding:12px 16px;
border-radius:16px;font-size:14px;line-height:1.55;
animation:msgIn .25s ease-out;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chat-msg.user{
background:linear-gradient(135deg,var(--primary),#1a4a70);
margin-left:auto;border-bottom-right-radius:4px;
}
.chat-msg.assistant{
background:var(--bg2);border:1px solid var(--border);
border-bottom-left-radius:4px;
}
.chat-msg.assistant .msg-text{white-space:pre-wrap;}
.chat-msg .msg-text strong{color:var(--accent);}
.chat-suggestions{
display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;
}
.suggest-chip{
background:var(--bg2);border:1px solid var(--border);
color:var(--accent);font-size:12px;padding:8px 14px;
border-radius:20px;cursor:pointer;transition:background .15s;
white-space:nowrap;
}
.suggest-chip:active{background:var(--primary);}
.chat-input-row{
display:flex;gap:8px;padding:8px 12px;
background:linear-gradient(180deg,transparent,var(--bg) 30%);
padding-bottom:calc(var(--tab-height) + env(safe-area-inset-bottom,0) + 12px);
}
.chat-input-row input{flex:1;border-radius:24px;padding:10px 18px;font-size:14px;}
.send-btn{
width:44px;height:44px;border-radius:50%;border:none;
background:linear-gradient(135deg,var(--accent),#1B8A7E);
color:#fff;font-size:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:transform .1s;flex-shrink:0;
}
.send-btn:active{transform:scale(.9);}
.typing-indicator{display:flex;gap:4px;padding:8px 0;}
.typing-indicator span{
width:8px;height:8px;border-radius:50%;background:var(--accent);
opacity:.4;animation:blink 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2){animation-delay:.2s;}
.typing-indicator span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.4}40%{opacity:1}}

/* Settings */
.settings-section{margin-bottom:24px;}
.settings-section h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.setting-row{
display:flex;align-items:center;justify-content:space-between;
padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
}
.setting-label{font-size:14px;}
.setting-value{font-size:13px;opacity:.6;}
.toggle-track{
width:50px;height:28px;border-radius:14px;
background:#1a2a3a;position:relative;cursor:pointer;
transition:background .2s;border:1px solid var(--border);
}
.toggle-track.on{background:var(--accent);border-color:var(--accent);}
.toggle-thumb{
width:22px;height:22px;border-radius:50%;background:#fff;
position:absolute;top:2px;left:2px;
transition:transform .2s;
}
.toggle-track.on .toggle-thumb{transform:translateX(22px);}
.linked-badge{
display:inline-flex;align-items:center;gap:6px;
background:var(--friction-low-bg);border:1px solid #205a28;
padding:8px 14px;border-radius:8px;font-size:13px;color:var(--friction-low-color);
margin-top:8px;
}
.app-info{text-align:center;padding:24px 0;opacity:.5;font-size:12px;line-height:1.6;}

/* Header */
.screen-header{
display:flex;align-items:center;justify-content:space-between;
padding:8px 0 16px 0;
}
.screen-header h1{font-size:20px;font-weight:800;}
.header-subtitle{font-size:12px;opacity:.5;font-weight:400;}

/* Utility */
.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.text-center{text-align:center;}
.text-sm{font-size:13px;}.text-xs{font-size:12px;}
.opacity-60{opacity:.6;}.opacity-70{opacity:.7;}

/* Splash */
.splash{
position:fixed;inset:0;z-index:999;
background:var(--bg);
display:flex;flex-direction:column;align-items:center;justify-content:center;
transition:opacity .4s;
}
.splash.hide{opacity:0;pointer-events:none;}
.splash-icon{font-size:72px;animation:float 2s ease-in-out infinite;}
.splash-title{font-size:22px;font-weight:800;color:var(--heading);margin-top:12px;}
.splash-sub{font-size:13px;color:var(--accent);margin-top:4px;opacity:.8;}

/* Inline link in settings */
.link-input-row{display:flex;gap:8px;margin-top:8px;}
.link-input-row input{flex:1;}
.link-input-row .btn{padding:12px 18px;white-space:nowrap;}

/* Notification status */
.notif-status{
display:inline-flex;align-items:center;gap:6px;
font-size:12px;padding:4px 10px;border-radius:6px;
}
.notif-status.granted{background:var(--friction-low-bg);color:var(--friction-low-color);}
.notif-status.denied{background:var(--friction-high-bg);color:var(--friction-high-color);}
.notif-status.default{background:var(--friction-med-bg);color:var(--friction-med-color);}
</style>
</head>

  <div class="splash-sub">Partner Edition</div>
</div>

<div class="app-container">

  <!-- Dashboard Screen -->
  <div class="screen active" id="screen-dashboard">
    <div class="screen-header">
      <div>

  </div>

  <!-- Settings Screen -->
  <div class="screen" id="screen-settings">
    <div class="screen-header">
      <h1 id="settings-title">Ajustes</h1>
    </div>
    <div id="settings-content"></div>
  </div>

</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="dashboard">
    <span class="tab-icon">🏠</span>

/* ============================================================
   CYCLE CALCULATIONS
   ============================================================ */
function getCycleDayFor(date, p) {
  if (!p || !p.lastPeriod) return { day: 1, phase: 'follicular' };
  const lastPeriodDate = new Date(p.lastPeriod);
  const diff = Math.floor((date - lastPeriodDate) / 86400000);
  const cycleLength = p.cycleLength || 28;
  const dayInCycle = ((diff % cycleLength) + cycleLength) % cycleLength + 1;
  const periodLen = p.periodLength || 5;
  let phase = 'follicular';
  if (dayInCycle <= periodLen) phase = 'menstrual';
  else if (dayInCycle <= Math.floor(cycleLength / 2)) phase = 'follicular';
  else if (dayInCycle <= Math.floor(cycleLength / 2) + 2) phase = 'ovulation';
  else phase = 'luteal';
  return { day: dayInCycle, phase };
}

function getMoonPhase(date) {
  const synodicMonth = 29.53058867;
  const epochMs = Date.UTC(2026, 3, 17, 18, 0, 0);
  const localNoon = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0).getTime();
  const daysDiff = (localNoon - epochMs) / 86400000;
  let moonAge = daysDiff % synodicMonth;
  if (moonAge < 0) moonAge += synodicMonth;
  const illumination = Math.round(100 * (1 - Math.cos(2 * Math.PI * moonAge / synodicMonth)) / 2);
  const phase = (moonAge / synodicMonth) * 100;
  let phaseName = 'new_moon';
  if (phase > 1.8 && phase <= 23.5) phaseName = 'waxing_crescent';
  else if (phase > 23.5 && phase <= 26.5) phaseName = 'first_quarter';
  else if (phase > 26.5 && phase <= 48.5) phaseName = 'waxing_gibbous';
  else if (phase > 48.5 && phase <= 51.5) phaseName = 'full_moon';
  else if (phase > 51.5 && phase <= 73.5) phaseName = 'waning_gibbous';
  else if (phase > 73.5 && phase <= 76.5) phaseName = 'last_quarter';
  else if (phase > 76.5 && phase <= 98.2) phaseName = 'waning_crescent';
  return { illumination, phase, phaseName, lunarDay: Math.ceil(moonAge) + 1 };
}

function computeFrictionForDay(dayInCycle, cycleLength, periodLength) {
  const cl = cycleLength || 28;
  const pl = periodLength || 5;
  const halfCycle = Math.floor(cl / 2);
  const pmsStart = cl - 6;
  if (dayInCycle === 1 || dayInCycle === 2) return { level: 'high', reasonKey: dayInCycle === 1 ? 'period_day1' : 'period_day2', phase: 'menstrual' };
  if (dayInCycle <= pl) return { level: 'medium', reasonKey: 'period_day2', phase: 'menstrual' };
  if (dayInCycle <= halfCycle - 1) return { level: 'low', reasonKey: 'follicular', phase: 'follicular' };
  if (dayInCycle >= halfCycle && dayInCycle <= halfCycle + 2) return { level: 'medium', reasonKey: 'ovulation_peak', phase: 'ovulation' };
  if (dayInCycle >= pmsStart) return { level: 'high', reasonKey: 'pms', phase: 'luteal' };
  return { level: 'medium', reasonKey: 'luteal_mid', phase: 'luteal' };
}

function getDaysUntilNextPeriod(p) {
  if (!p || !p.lastPeriod) return null;
  const today = new Date();
  const cycle = getCycleDayFor(today, p);
  const cl = p.cycleLength || 28;
  return cl - cycle.day;
}

function getMoonEmoji(phaseName) {
  const map = {
    new_moon: '🌑', waxing_crescent: '🌒', first_quarter: '🌓',
    waxing_gibbous: '🌔', full_moon: '🌕', waning_gibbous: '🌖',
    last_quarter: '🌗', waning_crescent: '🌘'
  };
  return map[phaseName] || '🌑';
}

function getFrictionTacticKey(friction) {
  const map = {
    period_day1: 'tactic_warmth',
    period_day2: 'tactic_warmth',
    follicular: 'tactic_plan',
    ovulation_peak: 'tactic_romance',
    pms: 'tactic_patience',
    luteal_mid: 'tactic_anticipate'
  };
  return map[friction.reasonKey] || 'tactic_listen';
}

function getFrictionNextHighKey(friction) {
  if (friction.phase === 'menstrual' || friction.phase === 'follicular' || friction.phase === 'ovulation') {
    return 'next_high_pms';
  }
  return 'next_high_period';
}

   ============================================================ */
function linkPartner(code, errEl) {
  db.collection('khloesmoon_users').where('shareCode', '==', code).get().then(snap => {
    if (snap.empty) {
      if (errEl) { errEl.textContent = t('code_not_found'); errEl.style.display = 'block'; }
      return;
    }
    linkedCode = code;
    localStorage.setItem('kmp_linked_code', code);
    if (errEl) errEl.style.display = 'none';
    listenToPartner();
  }).catch(err => {
    console.error('Link error:', err);
    if (errEl) { errEl.textContent = t('code_not_found'); errEl.style.display = 'block'; }
  });
}

function unlinkPartner() {
  linkedCode = '';
  partnerProfile = null;
  localStorage.removeItem('kmp_linked_code');
  if (firestoreUnsubscribe) { firestoreUnsubscribe(); firestoreUnsubscribe = null; }
  renderDashboard();
  renderSettings();
}

function listenToPartner() {
  if (firestoreUnsubscribe) { firestoreUnsubscribe(); firestoreUnsubscribe = null; }
  if (!linkedCode) return;

  firestoreUnsubscribe = db.collection('khloesmoon_users')
    .where('shareCode', '==', linkedCode)
    .onSnapshot(snap => {
      if (snap.empty) {
        partnerProfile = null;
      } else {
        const doc = snap.docs[0];
        const data = doc.data();
        partnerProfile = data.profile || data;
        if (data.profile) {
          partnerProfile = data.profile;
        }
        if (!partnerProfile.name && data.name) partnerProfile.name = data.name;
      }
      if (currentTab === 'dashboard') renderDashboard();
      if (currentTab === 'settings') renderSettings();
    }, err => {
      console.error('Snapshot error:', err);
    });
}

/* ============================================================
   SETTINGS
   ============================================================ */

    langOptions.forEach(function(l){ html += '<option value="' + l.code + '"' + (currentLang === l.code ? ' selected' : '') + '>' + l.name + '</option>'; });
    html += '</select>'; html += '<div class="toggle-thumb"></div>';
  html += '</div>';

  html += '<div class="text-xs opacity-60 mt-8">' + (currentLang === 'es' ? 'Español' : 'English') + '</div>';
  html += '</div>';

  // Notifications

  html += '<h3>🔔 ' + t('notif_section') + '</h3>';

  html += '<span class="setting-label">' + t('notif_section') + '</span>';
  html += '<span class="notif-status ' + notifPerm + '">' + t('notif_' + notifPerm) + '</span>';

    html += '<button class="btn btn-secondary btn-block mt-12" id="notif-request-btn">🔔 ' + t('notif_request') + '</button>';

  html += '<button class="btn btn-secondary" id="api-save-btn">' + t('api_save') + '</button>';

  html += '<div style="font-size:15px;font-weight:700;color:var(--heading);">' + t('about_text') + '</div>';
  html += '<div style="margin-top:6px;">' + t('about_desc') + '</div>';
  html += '</div>';

  // Event listeners
  const unlinkBtn = document.getElementById('unlink-btn');
  if (unlinkBtn) unlinkBtn.addEventListener('click', unlinkPartner);

  const settingsLinkBtn = document.getElementById('settings-link-btn');
  if (settingsLinkBtn) {
    const settingsInput = document.getElementById('settings-link-input');
    const settingsErr = document.getElementById('settings-link-error');
    settingsLinkBtn.addEventListener('click', () => {
      const code = (settingsInput.value || '').trim().toUpperCase();
      if (!code) return;
      linkPartner(code, settingsErr);
    });
    settingsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') settingsLinkBtn.click(); });
  }

    document.getElementById('lang-select').onchange = function() {
      currentLang = this.value;
      localStorage.setItem('km_partner_lang', currentLang);
      renderAll();
    };

    let url = proxyUrl;
    const headers = { 'Content-Type': 'application/json' };

    if (apiKey) {
      url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey;
    }

    const resp = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(payload)
    });

    const data = await resp.json();
    let aiText = '';

    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
      aiText = data.candidates[0].content.parts.map(p => p.text).join('');
    } else if (data.error) {
      aiText = t('chat_error') + ' (' + (data.error.message || 'Unknown') + ')';
    } else {
      aiText = t('chat_error');
    }

    // Remove typing indicator
    const typingEl = document.getElementById('typing-msg');
    if (typingEl) typingEl.remove();

    chatHistory.push({ role: 'assistant', content: aiText });
    saveChatHistory();

    const formatted = escapeHtml(aiText).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    messagesEl.innerHTML += '<div class="chat-msg assistant"><div class="msg-text">' + formatted + '</div></div>';
    messagesEl.scrollTop = messagesEl.scrollHeight;

  } catch (err) {
    console.error('Chat error:', err);
    const typingEl = document.getElementById('typing-msg');
    if (typingEl) typingEl.remove();
    messagesEl.innerHTML += '<div class="chat-msg assistant"><div class="msg-text">' + t('chat_error') + '</div></div>';
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function saveChatHistory() {
  try {
    // Keep last 50 messages
    if (chatHistory.length > 50) chatHistory = chatHistory.slice(-50);
    localStorage.setItem('kmp_chat_history', JSON.stringify(chatHistory));
  } catch(e) {}
}

// Chat event listeners
document.getElementById('chat-send').addEventListener('click', () => {
  sendChatMessage(document.getElementById('chat-input').value);
});
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendChatMessage(document.getElementById('chat-input').value);
});

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
function checkPartnerDailyNotification() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!partnerProfile || !partnerProfile.lastPeriod) return;

  const today = new Date();
  const todayKey = today.toISOString().split('T')[0];
  const lastNotifDay = localStorage.getItem('kmp_notif_day');
  if (lastNotifDay === todayKey) return;

  const cycle = getCycleDayFor(today, partnerProfile);
  const cl = partnerProfile.cycleLength || 28;
  const pl = partnerProfile.periodLength || 5;
  const halfCycle = Math.floor(cl / 2);
  const pmsStart = cl - 6;
  const pmsPeak = cl - 2;

  let notifTitle = null;
  let notifBody = null;

  // Day 1 — period start
  if (cycle.day === 1) {
    notifTitle = t('notif_period_day1_title');
    notifBody = t('notif_period_day1_body');
  }
  // Day 2 — period day 2
  else if (cycle.day === 2) {
    notifTitle = t('notif_period_day2_title');
    notifBody = t('notif_period_day2_body');
  }
  // Last period day
  else if (cycle.day === pl) {
    notifTitle = t('notif_period_last_title');
    notifBody = t('notif_period_last_body');
  }
  // Ovulation day
  else if (cycle.day === halfCycle + 1) {
    notifTitle = t('notif_ovulation_title');
    notifBody = t('notif_ovulation_body');
  }
  // Fertile window start (2 days before ovulation)
  else if (cycle.day === halfCycle - 1) {
    notifTitle = t('notif_fertile_title');
    notifBody = t('notif_fertile_body');
  }
  // PMS start
  else if (cycle.day === pmsStart) {
    notifTitle = t('notif_pms_start_title');
    notifBody = t('notif_pms_start_body');
  }
  // PMS peak
  else if (cycle.day === pmsPeak) {
    notifTitle = t('notif_pms_peak_title');
    notifBody = t('notif_pms_peak_body');
  }
  // Day before period
  else if (cycle.day === cl) {
    notifTitle = t('notif_day_before_title');
    notifBody = t('notif_day_before_body');
  }
  // Follicular energy boost (day after period ends)
  else if (cycle.day === pl + 1) {
    notifTitle = t('notif_follicular_title');
    notifBody = t('notif_follicular_body');
  }

  if (notifTitle && notifBody) {
    localStorage.setItem('kmp_notif_day', todayKey);
    try {
      new Notification(notifTitle, {
        body: notifBody,
        icon: 'icon-192.png',
        badge: 'icon-192.png',
        tag: 'kmp-daily'
      });
    } catch(e) {
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(notifTitle, {
            body: notifBody,
            icon: 'icon-192.png',
            badge: 'icon-192.png',
            tag: 'kmp-daily'
          });
        });
      }
    }
  }
}

/* ============================================================
   SERVICE WORKER
   ============================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (newWorker) {
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
            console.log('New SW version available');
          }
        });
      }
    });
  }).catch(err => console.log('SW registration failed:', err));
}

/* ============================================================
   URL PARAM AUTO-LINK
   ============================================================ */
function checkUrlParam() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('partner');
  if (code && !linkedCode) {
    linkedCode = code.toUpperCase();
    localStorage.setItem('kmp_linked_code', linkedCode);
    // Clean URL
    window.history.replaceState({}, '', window.location.pathname);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  checkUrlParam();
  updateTabLabels();

  // Authenticate anonymously then start
  auth.signInAnonymously().then(() => {
    console.log('Firebase auth OK');
    if (linkedCode) {
      listenToPartner();
    }
    renderDashboard();

    // Hide splash
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 500);
    }, 800);

    // Notifications: check after 3 seconds, then every 4 hours
    setTimeout(checkPartnerDailyNotification, 3000);
    setInterval(checkPartnerDailyNotification, 4 * 60 * 60 * 1000);

  }).catch(err => {
    console.error('Auth error:', err);
    // Still render even if auth fails
    renderDashboard();
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => splash.remove(), 500);
    }, 800);
  });
}

init();

})();
